<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Clique Rápido</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin-top: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #clickBtn {
            padding: 20px 40px;
            font-size: 1.5rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #clickBtn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .info {
            font-size: 1.2rem;
            margin: 15px 0;
        }
        #resetBtn {
            padding: 8px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Clique Rápido!</h1>
    <p class="info">Tempo restante: <span id="timer">10</span>s</p>
    <p class="info">Cliques: <span id="score">0</span></p>
    
    <button id="clickBtn" onclick="registerClick()">CLIQUE AQUI!</button>
    <br><br>
    <button id="resetBtn" onclick="resetGame()">Jogar Novamente</button>
</div>

<script>
    let clicks = 0;
    let timeLeft = 10;
    let timerId = null;
    let gameStarted = false;

    const clickBtn = document.getElementById('clickBtn');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');

    function registerClick() {
        if (!gameStarted) {
            startTimer();
            gameStarted = true;
        }
        
        if (timeLeft > 0) {
            clicks++;
            scoreDisplay.innerText = clicks;
        }
    }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timerId);
                clickBtn.disabled = true;
                alert(`Fim de jogo! Você conseguiu ${clicks} cliques.`);
            }
        }, 1000);
    }

    function resetGame() {
        clearInterval(timerId);
        clicks = 0;
        timeLeft = 10;
        gameStarted = false;
        clickBtn.disabled = false;
        scoreDisplay.innerText = clicks;
        timerDisplay.innerText = timeLeft;
    }
</script>

</body>
</html>
